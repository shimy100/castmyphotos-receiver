<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>CastMyPhotos Receiver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; background: #000; overflow: hidden; }

    /* Photo slides – three buffers for seamless crossfade */
    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity, transform;
    }
    .slide.visible { opacity: 1; }

    /* Ken Burns variants – alternated so consecutive photos feel different */
    @keyframes kb1 {
      from { transform: scale(1.00) translate( 0%,  0%); }
      to   { transform: scale(1.10) translate(-2%, -2%); }
    }
    @keyframes kb2 {
      from { transform: scale(1.08) translate( 2%,  1%); }
      to   { transform: scale(1.00) translate( 0%,  0%); }
    }
    @keyframes kb3 {
      from { transform: scale(1.00) translate( 1%,  2%); }
      to   { transform: scale(1.10) translate(-1%,  0%); }
    }

    .kb1 { animation: kb1 var(--dur, 7s) ease-in-out forwards; }
    .kb2 { animation: kb2 var(--dur, 7s) ease-in-out forwards; }
    .kb3 { animation: kb3 var(--dur, 7s) ease-in-out forwards; }

    /* Music info overlay */
    #music-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 14px 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: #fff;
      font-family: 'Google Sans', sans-serif;
      font-size: 22px;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }
    #music-bar.visible { opacity: 1; }
    #music-title { font-size: 20px; font-weight: 500; }
    #music-icon  { display: inline-block; margin-right: 8px; }

    /* YouTube player – small but "visible" per ToS, hidden in corner */
    #yt-player {
      position: fixed;
      bottom: 4px; right: 4px;
      width: 240px; height: 135px;
      opacity: 0.01;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>

  <!-- Three photo buffers for crossfade -->
  <div id="s0" class="slide"></div>
  <div id="s1" class="slide"></div>
  <div id="s2" class="slide"></div>

  <!-- Music info bar -->
  <div id="music-bar">
    <span id="music-icon">♪</span>
    <span id="music-title"></span>
  </div>

  <!-- Tiny YouTube iframe player -->
  <div id="yt-player"></div>

  <!-- Cast Application Framework receiver SDK -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <script>
    'use strict';

    const NS       = 'urn:x-cast:com.castmyphotos.app';
    const FADE_MS  = 1400;
    const KB_ANIM  = ['kb1', 'kb2', 'kb3'];

    const slides   = [0, 1, 2].map(i => document.getElementById('s' + i));
    const musicBar = document.getElementById('music-bar');
    const musicTitle = document.getElementById('music-title');

    let activeSlide = 0;
    let kbIndex     = 0;
    let musicBarTimer = null;

    // ─── Photo display ────────────────────────────────────────────────────────

    function preloadImage(url) {
      const img = new Image();
      img.src = url;
    }

    function showImage(url, durationSeconds) {
      const dur  = (durationSeconds || 7) + 's';
      const next = (activeSlide + 1) % 3;
      const prev = activeSlide;

      const el = slides[next];
      el.style.setProperty('--dur', dur);
      el.style.backgroundImage = `url("${url}")`;

      // Restart Ken Burns animation
      el.classList.remove(...KB_ANIM);
      void el.offsetHeight;                        // force reflow
      el.classList.add(KB_ANIM[kbIndex % KB_ANIM.length]);
      el.classList.add('visible');

      // Fade out previous slide after crossfade completes
      setTimeout(() => {
        slides[prev].classList.remove('visible');
        setTimeout(() => {
          slides[prev].style.backgroundImage = '';
          slides[prev].classList.remove(...KB_ANIM);
        }, FADE_MS + 100);
      }, FADE_MS);

      activeSlide = next;
      kbIndex++;
    }

    // ─── YouTube audio ────────────────────────────────────────────────────────

    let ytPlayer    = null;
    let ytReady     = false;
    let pendingPlay = null;
    let googleToken = null;

    // ─── Google auth: prime YouTube session with user's OAuth token ───────────
    // Sending an authenticated request to YouTube establishes the session context
    // in the Cast receiver's Chrome browser, allowing Premium to be recognized.
    async function applyGoogleAuth(token) {
      if (!token) return;
      googleToken = token;
      try {
        const res = await fetch(
          'https://www.googleapis.com/youtube/v3/channels?part=snippet&mine=true&maxResults=1',
          { headers: { 'Authorization': 'Bearer ' + token } }
        );
        const data = await res.json();
        const name = data?.items?.[0]?.snippet?.title;
        console.log('[CastMyPhotos] YouTube signed in as:', name || 'unknown');

        // Rebuild the IFrame player so it picks up the authenticated session
        if (ytPlayer && ytReady) {
          const currentVideo = pendingPlay;
          ytPlayer.destroy();
          ytReady = false;
          ytPlayer = null;
          initYTPlayer(currentVideo);
        }
      } catch (e) {
        console.error('[CastMyPhotos] YouTube auth error:', e);
      }
    }

    function initYTPlayer(autoPlayId) {
      ytPlayer = new YT.Player('yt-player', {
        width: '240', height: '135',
        playerVars: {
          autoplay: 0, controls: 0, disablekb: 1,
          fs: 0, rel: 0,
          origin: window.location.origin
        },
        events: {
          onReady: () => {
            ytReady = true;
            if (autoPlayId) { ytPlayer.loadVideoById(autoPlayId); autoPlayId = null; }
            else if (pendingPlay) { ytPlayer.loadVideoById(pendingPlay); pendingPlay = null; }
          },
          onStateChange: e => {
            if (e.data === YT.PlayerState.ENDED) {
              ytPlayer.seekTo(0);
              ytPlayer.playVideo();
            }
          }
        }
      });
    }

    // Dynamically load YouTube IFrame API
    (function loadYTApi() {
      const s = document.createElement('script');
      s.src   = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(s);
    })();

    window.onYouTubeIframeAPIReady = function () {
      initYTPlayer(null);
    };

    function playMusic(videoId, title) {
      if (ytReady && ytPlayer) {
        ytPlayer.loadVideoById(videoId);
      } else {
        pendingPlay = videoId;
      }

      // Show music bar briefly
      if (title) {
        musicTitle.textContent = title;
        musicBar.classList.add('visible');
        clearTimeout(musicBarTimer);
        musicBarTimer = setTimeout(() => musicBar.classList.remove('visible'), 5000);
      }
    }

    function stopMusic() {
      if (ytPlayer && ytReady) ytPlayer.stopVideo();
      musicBar.classList.remove('visible');
    }

    function pauseMusic() {
      if (ytPlayer && ytReady) ytPlayer.pauseVideo();
    }

    function resumeMusic() {
      if (ytPlayer && ytReady) ytPlayer.playVideo();
    }

    // ─── Cast message handling ────────────────────────────────────────────────

    const context = cast.framework.CastReceiverContext.getInstance();

    context.addCustomMessageListener(NS, event => {
      try {
        const data = typeof event.data === 'string'
          ? JSON.parse(event.data) : event.data;

        switch (data.action) {
          case 'auth':
            applyGoogleAuth(data.token);
            break;
          case 'preload':
            preloadImage(data.url);
            break;
          case 'play_music':
            playMusic(data.videoId, data.title);
            break;
          case 'stop_music':
            stopMusic();
            break;
          case 'pause_music':
            pauseMusic();
            break;
          case 'resume_music':
            resumeMusic();
            break;
          default:
            // Default: show photo
            if (data.url) showImage(data.url, data.durationSeconds);
        }
      } catch (e) {
        console.error('[CastMyPhotos] message error:', e);
      }
    });

    context.start({ disableIdleTimeout: true });
  </script>
</body>
</html>
