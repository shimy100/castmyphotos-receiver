<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>CastMyPhotos Receiver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; background: #000; overflow: hidden; }

    /* Photo slides – three buffers for seamless crossfade, above youtube.com/tv iframe */
    .slide {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity, transform;
      z-index: 2;
    }
    .slide.visible { opacity: 1; }

    /* Ken Burns variants – alternated so consecutive photos feel different */
    @keyframes kb1 {
      from { transform: scale(1.00) translate( 0%,  0%); }
      to   { transform: scale(1.10) translate(-2%, -2%); }
    }
    @keyframes kb2 {
      from { transform: scale(1.08) translate( 2%,  1%); }
      to   { transform: scale(1.00) translate( 0%,  0%); }
    }
    @keyframes kb3 {
      from { transform: scale(1.00) translate( 1%,  2%); }
      to   { transform: scale(1.10) translate(-1%,  0%); }
    }

    .kb1 { animation: kb1 var(--dur, 7s) ease-in-out forwards; }
    .kb2 { animation: kb2 var(--dur, 7s) ease-in-out forwards; }
    .kb3 { animation: kb3 var(--dur, 7s) ease-in-out forwards; }

    /* Music info overlay – always visible above photos while playing */
    #music-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 18px 28px 22px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85) 40%);
      color: #fff;
      font-family: 'Google Sans', sans-serif;
      font-size: 22px;
      opacity: 0;
      transition: opacity 0.8s;
      pointer-events: none;
      z-index: 10;
    }
    #music-bar.visible { opacity: 1; }
    #music-title {
      font-size: 22px;
      font-weight: 500;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 90vw;
    }
    #music-icon { display: inline-block; margin-right: 10px; }

    /* IFrame API fallback player */
    #yt-player {
      position: fixed;
      bottom: 4px; right: 4px;
      width: 1px; height: 1px;
      opacity: 0.01;
      pointer-events: none;
      z-index: 3;
    }
  </style>
</head>
<body>

  <!-- Three photo buffers for crossfade -->
  <div id="s0" class="slide"></div>
  <div id="s1" class="slide"></div>
  <div id="s2" class="slide"></div>

  <!-- Music info bar -->
  <div id="music-bar">
    <span id="music-icon">♪</span>
    <span id="music-title"></span>
  </div>

  <!-- Tiny YouTube iframe player -->
  <div id="yt-player"></div>

  <!-- Invidious/embed iframe – visible (z-index:1) so Chrome allows unmuted autoplay,
       but covered by photo slides (z-index:2) so user only sees photos -->
  <iframe id="yt-tv-frame"
      src="about:blank"
      allow="autoplay; encrypted-media; fullscreen"
      style="position:fixed;inset:0;width:100%;height:100%;z-index:1;border:none;pointer-events:none;background:#000;">
  </iframe>

  <!-- Cast Application Framework receiver SDK -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <script>
    'use strict';

    const NS       = 'urn:x-cast:com.castmyphotos.app';
    const FADE_MS  = 1400;
    const KB_ANIM  = ['kb1', 'kb2', 'kb3'];

    const slides   = [0, 1, 2].map(i => document.getElementById('s' + i));
    const musicBar = document.getElementById('music-bar');
    const musicTitle = document.getElementById('music-title');

    let activeSlide = 0;
    let kbIndex     = 0;
    let musicBarTimer = null;

    // ─── Photo display ────────────────────────────────────────────────────────

    function preloadImage(url) {
      const img = new Image();
      img.src = url;
    }

    function showImage(url, durationSeconds) {
      const dur  = (durationSeconds || 7) + 's';
      const next = (activeSlide + 1) % 3;
      const prev = activeSlide;

      const el = slides[next];
      el.style.setProperty('--dur', dur);
      el.style.backgroundImage = `url("${url}")`;

      // Restart Ken Burns animation
      el.classList.remove(...KB_ANIM);
      void el.offsetHeight;                        // force reflow
      el.classList.add(KB_ANIM[kbIndex % KB_ANIM.length]);
      el.classList.add('visible');

      // Fade out previous slide after crossfade completes
      setTimeout(() => {
        slides[prev].classList.remove('visible');
        setTimeout(() => {
          slides[prev].style.backgroundImage = '';
          slides[prev].classList.remove(...KB_ANIM);
        }, FADE_MS + 100);
      }, FADE_MS);

      activeSlide = next;
      kbIndex++;
    }

    // ─── YouTube audio ────────────────────────────────────────────────────────

    let ytPlayer    = null;
    let ytReady     = false;
    let pendingPlay = null;
    let googleToken = null;

    // ─── Google auth: prime YouTube session with user's OAuth token ───────────
    // Sending an authenticated request to YouTube establishes the session context
    // in the Cast receiver's Chrome browser, allowing Premium to be recognized.
    async function applyGoogleAuth(token) {
      if (!token) return;
      googleToken = token;
      try {
        const res = await fetch(
          'https://www.googleapis.com/youtube/v3/channels?part=snippet&mine=true&maxResults=1',
          { headers: { 'Authorization': 'Bearer ' + token } }
        );
        const data = await res.json();
        console.log('[CastMyPhotos] YouTube API auth:', data?.items?.[0]?.snippet?.title || 'unknown');
      } catch (e) {
        console.error('[CastMyPhotos] YouTube auth error:', e);
      }
    }

    // Device Code Flow token – multi-strategy approach to establish YouTube Premium session
    async function applyYouTubePremiumToken(token, clientId) {
      if (!token) return;
      googleToken = token;
      console.log('[CastMyPhotos] Applying YouTube Premium – starting multi-strategy auth...');

      try {
        // Strategy 1: OAuthLogin – converts OAuth token to Google session cookie
        const loginUrl = `https://accounts.google.com/accounts/OAuthLogin` +
          `?source=profiles&issuedTo=${encodeURIComponent(clientId)}&token=${encodeURIComponent(token)}`;
        await loadInFrame(loginUrl, 4000);
        console.log('[CastMyPhotos] OAuthLogin iframe done');

        // Strategy 2: Load YouTube Music to warm up music.youtube.com session cookies
        await loadInFrame('https://music.youtube.com', 5000);
        console.log('[CastMyPhotos] YouTube Music warm-up done');

        // Strategy 3: Load YouTube TV (regular)
        await loadInFrame('https://www.youtube.com/tv?nomobile=1', 4000);
        console.log('[CastMyPhotos] YouTube TV warm-up done');

        // Give cookies time to propagate, then rebuild player fresh
        await new Promise(r => setTimeout(r, 1000));
        console.log('[CastMyPhotos] Rebuilding YouTube player with Premium session...');

        const saved = pendingPlay;
        if (ytPlayer) { ytPlayer.destroy(); ytReady = false; ytPlayer = null; }
        initYTPlayer(saved?.id || null);
      } catch (e) {
        console.error('[CastMyPhotos] Premium auth error:', e);
      }
    }

    function loadInFrame(url, timeoutMs) {
      return new Promise(resolve => {
        const f = document.createElement('iframe');
        f.style.cssText = 'position:fixed;width:1px;height:1px;left:-9999px;top:-9999px;opacity:0;';
        f.src = url;
        f.onload = resolve;
        setTimeout(resolve, timeoutMs);
        document.body.appendChild(f);
        setTimeout(() => { try { document.body.removeChild(f); } catch(_){} }, timeoutMs + 500);
      });
    }

    function initYTPlayer(autoPlayId) {
      ytPlayer = new YT.Player('yt-player', {
        width: '240', height: '135',
        playerVars: {
          autoplay: 0, controls: 0, disablekb: 1,
          fs: 0, rel: 0,
          origin: window.location.origin
        },
        events: {
          onReady: () => {
            ytReady = true;
            if (autoPlayId) { ytPlayer.loadVideoById(autoPlayId); autoPlayId = null; }
            else if (pendingPlay) {
              if (pendingPlay.type === 'playlist') {
                ytPlayer.loadPlaylist({ list: pendingPlay.id, listType: 'playlist', index: 0 });
                ytPlayer.setLoop(true);
              } else {
                ytPlayer.loadVideoById(pendingPlay.id || pendingPlay);
              }
              pendingPlay = null;
            }
          },
          onStateChange: e => {
            if (e.data === YT.PlayerState.ENDED) {
              ytPlayer.seekTo(0);
              ytPlayer.playVideo();
            }
          }
        }
      });
    }

    // Dynamically load YouTube IFrame API
    (function loadYTApi() {
      const s = document.createElement('script');
      s.src   = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(s);
    })();

    window.onYouTubeIframeAPIReady = function () {
      initYTPlayer(null);
    };

    function showMusicBar(title) {
      if (!title) return;
      musicTitle.textContent = title;
      musicBar.classList.add('visible');
      clearTimeout(musicBarTimer);
      // Keep bar visible while music plays – cleared only by stopMusic/stopYtTv
    }

    function updateMusicBar(title) {
      if (title) musicTitle.textContent = title;
    }

    function playMusic(videoId, title) {
      if (ytReady && ytPlayer) {
        ytPlayer.loadVideoById(videoId);
      } else {
        pendingPlay = { type: 'video', id: videoId };
      }
      showMusicBar(title);
    }

    function playPlaylist(playlistId, title) {
      if (ytReady && ytPlayer) {
        ytPlayer.loadPlaylist({ list: playlistId, listType: 'playlist', index: 0 });
        ytPlayer.setLoop(true);
      } else {
        pendingPlay = { type: 'playlist', id: playlistId };
      }
      showMusicBar('▶ ' + (title || 'Playlist'));
    }

    function stopMusic() {
      if (ytPlayer && ytReady) ytPlayer.stopVideo();
      musicBar.classList.remove('visible');
    }

    function pauseMusic() {
      if (ytPlayer && ytReady) ytPlayer.pauseVideo();
    }

    function resumeMusic() {
      if (ytPlayer && ytReady) ytPlayer.playVideo();
    }

    // ─── youtube.com/tv iframe test ──────────────────────────────────────────

    // We confirmed youtube.com/tv loads on this device – enable immediately
    let ytTvReady = true;
    const ytTvFrame = document.getElementById('yt-tv-frame');

    function testYoutubeTvIframe() {
      console.log('[CastMyPhotos] Testing youtube.com/tv iframe load...');
      const timeout = setTimeout(() => {
        console.warn('[CastMyPhotos] youtube.com/tv iframe timed out (X-Frame-Options?)');
        sendIframeTestResult(false, 'timeout');
      }, 8000);

      ytTvFrame.onload = () => {
        clearTimeout(timeout);
        try {
          // If we can access contentDocument, the iframe loaded from same origin (unlikely)
          // If it throws, it's cross-origin but still loaded
          const doc = ytTvFrame.contentDocument;
          if (doc && doc.body) {
            console.log('[CastMyPhotos] youtube.com/tv iframe loaded, body accessible (same-origin?)');
            sendIframeTestResult(true, 'loaded_same_origin');
          } else {
            console.log('[CastMyPhotos] youtube.com/tv iframe loaded cross-origin (expected)');
            sendIframeTestResult(true, 'loaded_cross_origin');
            ytTvReady = true;
          }
        } catch (e) {
          // SecurityError = cross-origin loaded successfully
          console.log('[CastMyPhotos] youtube.com/tv iframe loaded (cross-origin confirmed)');
          sendIframeTestResult(true, 'loaded_cross_origin');
          ytTvReady = true;
        }
      };

      ytTvFrame.onerror = () => {
        clearTimeout(timeout);
        console.error('[CastMyPhotos] youtube.com/tv iframe failed to load');
        sendIframeTestResult(false, 'load_error');
      };

      ytTvFrame.src = 'https://www.youtube.com/tv';
    }

    function sendIframeTestResult(success, reason) {
      // Show result directly on TV screen (no channel needed)
      const div = document.createElement('div');
      div.style.cssText = [
        'position:fixed', 'top:40px', 'left:50%', 'transform:translateX(-50%)',
        'z-index:9999', 'padding:24px 40px', 'border-radius:16px',
        'font-family:sans-serif', 'font-size:32px', 'font-weight:bold',
        'color:#fff', 'text-align:center',
        success
          ? 'background:rgba(0,180,0,0.9)'
          : 'background:rgba(200,0,0,0.9)'
      ].join(';');
      div.textContent = success
        ? `✅ youtube.com/tv נטען! (${reason})`
        : `❌ youtube.com/tv חסום (${reason})`;
      document.body.appendChild(div);
      console.log(`[CastMyPhotos] iframe_test_result: success=${success} reason=${reason}`);
      // Auto-remove after 30 seconds
      setTimeout(() => div.remove(), 30000);
    }

    // ─── Premium audio via youtube.com/tv iframe ─────────────────────────────

    // Unmute the embed iframe via postMessage (after muted autoplay starts)
    function unmuteTvFrame() {
      try {
        const win = ytTvFrame.contentWindow;
        if (!win) return;
        // YouTube embed postMessage API commands
        win.postMessage(JSON.stringify({ event: 'command', func: 'unMute',    args: [] }), 'https://www.youtube.com');
        win.postMessage(JSON.stringify({ event: 'command', func: 'setVolume', args: [100] }), 'https://www.youtube.com');
        console.log('[CastMyPhotos] Unmute postMessage sent');
      } catch (e) {
        console.error('[CastMyPhotos] Unmute failed:', e);
      }
    }

    // Play via YouTube embed – muted autoplay (Chrome allows) then unmute via postMessage
    function playYtTvPlaylist(playlistId, title) {
      if (ytPlayer && ytReady) { try { ytPlayer.stopVideo(); } catch(_) {} }
      // mute=1 allows autoplay in Chrome; enablejsapi=1 enables postMessage control
      const url = `https://www.youtube.com/embed/videoseries?list=${encodeURIComponent(playlistId)}&autoplay=1&mute=1&enablejsapi=1&rel=0&controls=0`;
      console.log('[CastMyPhotos] Playing playlist (muted autoplay):', url);
      ytTvFrame.src = url;
      // Unmute after the video has started (2 seconds grace period)
      setTimeout(unmuteTvFrame, 2000);
      setTimeout(unmuteTvFrame, 4000); // retry
      showMusicBar(title || '▶ YouTube Premium');
    }

    function playYtTvVideo(videoId, title) {
      if (ytPlayer && ytReady) { try { ytPlayer.stopVideo(); } catch(_) {} }
      const url = `https://www.youtube.com/embed/${encodeURIComponent(videoId)}?autoplay=1&mute=1&enablejsapi=1&rel=0&controls=0&loop=1&playlist=${encodeURIComponent(videoId)}`;
      console.log('[CastMyPhotos] Playing video (muted autoplay):', url);
      ytTvFrame.src = url;
      setTimeout(unmuteTvFrame, 2000);
      setTimeout(unmuteTvFrame, 4000); // retry
      showMusicBar(title || '▶ YouTube Premium');
    }

    // ─── Invidious ad-free playback ──────────────────────────────────────────

    function showDebugUrl(url) {
      const existing = document.getElementById('debug-url');
      if (existing) existing.remove();
      const div = document.createElement('div');
      div.id = 'debug-url';
      div.style.cssText = 'position:fixed;top:10px;left:10px;right:10px;z-index:9999;background:rgba(0,0,0,0.8);color:#0f0;font-family:monospace;font-size:14px;padding:8px;border-radius:8px;word-break:break-all;';
      div.textContent = '🔗 ' + url;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 15000);
    }

    function attachIframeDebugListeners(url) {
      const loadTimer = setTimeout(() => {
        console.warn('[CastMyPhotos] Iframe timed out:', url);
        hideInvidiousBehindPhotos(0);
      }, 15000);

      ytTvFrame.onload = () => {
        clearTimeout(loadTimer);
        console.log('[CastMyPhotos] Iframe loaded:', url);
        hideInvidiousBehindPhotos(2000);
      };

      ytTvFrame.onerror = () => {
        clearTimeout(loadTimer);
        console.error('[CastMyPhotos] Iframe onerror:', url);
        hideInvidiousBehindPhotos(0);
      };
    }

    function showOnScreen(msg, color) {
      const existing = document.getElementById('iframe-status');
      if (existing) existing.remove();
      const div = document.createElement('div');
      div.id = 'iframe-status';
      div.style.cssText = `position:fixed;top:200px;left:10px;right:10px;z-index:9998;background:rgba(0,0,0,0.85);color:${color || '#fff'};font-family:monospace;font-size:16px;padding:10px;border-radius:8px;word-break:break-all;`;
      div.textContent = msg;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 20000);
    }

    // ─── Invidious playlist state ─────────────────────────────────────────────
    let invidiousVideoIds  = [];
    let invidiousIndex     = 0;
    let invidiousHost      = 'https://invidious.f5.si';
    let invidiousListId    = '';

    // Listen for postMessage events from Invidious iframe (video ended = state 0)
    window.addEventListener('message', event => {
      try {
        let data = event.data;
        if (typeof data === 'string') data = JSON.parse(data);
        // YouTube IFrame API: info=0 means ENDED
        if (data?.event === 'onStateChange' && data?.info === 0) {
          console.log('[CastMyPhotos] Invidious video ended, loading next...');
          advanceInvidiousPlaylist();
        }
      } catch(_) {}
    });

    function advanceInvidiousPlaylist() {
      if (invidiousVideoIds.length === 0) return;
      invidiousIndex = (invidiousIndex + 1) % invidiousVideoIds.length;
      const nextId = invidiousVideoIds[invidiousIndex];
      const host   = invidiousHost;
      const url    = `${host}/embed/${encodeURIComponent(nextId)}?list=${encodeURIComponent(invidiousListId)}&autoplay=1`;
      console.log('[CastMyPhotos] Next track:', url);
      ytTvFrame.style.zIndex = '4';  // bring up briefly for autoplay
      attachIframeDebugListeners(url);
      ytTvFrame.src = url;
    }

    // Unmute Invidious iframe via postMessage (same API as YouTube embed)
    function unmuteInvidious() {
      try {
        const win = ytTvFrame.contentWindow;
        if (!win) return;
        // Try YouTube-style postMessage
        win.postMessage(JSON.stringify({ event: 'command', func: 'unMute', args: [] }), '*');
        win.postMessage(JSON.stringify({ event: 'command', func: 'setVolume', args: [100] }), '*');
        // Also try Invidious native postMessage
        win.postMessage({ key: 'invidious', value: { event: 'unMute' } }, '*');
        win.postMessage('{"event":"command","func":"unMute","args":""}', '*');
        console.log('[CastMyPhotos] Invidious unmute postMessage sent');
      } catch (e) { console.error('[CastMyPhotos] Invidious unmute error:', e); }
    }

    function stopIframeApiAudio() {
      if (!ytPlayer) return;
      try { ytPlayer.stopVideo(); } catch(_) {}
      try { ytPlayer.setVolume(0); } catch(_) {}
      try { ytPlayer.mute(); } catch(_) {}
    }

    // After audio starts, lower iframe behind photos (audio continues playing)
    function hideInvidiousBehindPhotos(delay) {
      setTimeout(() => {
        ytTvFrame.style.zIndex = '1';
        console.log('[CastMyPhotos] Invidious audio running, iframe hidden behind photos');
      }, delay);
    }

    function playInvidiousVideo(videoId, title, base) {
      stopIframeApiAudio();
      const host = (base || 'https://invidious.f5.si').replace(/\/$/, '');
      const url = `${host}/embed/${encodeURIComponent(videoId)}?autoplay=1&loop=1`;
      console.log('[CastMyPhotos] Invidious video URL:', url);
      showDebugUrl(url);
      // Start visible so Chrome allows autoplay, then hide behind photos
      ytTvFrame.style.zIndex = '4';
      attachIframeDebugListeners(url);
      ytTvFrame.src = url;
      setTimeout(unmuteInvidious, 2000);
      showMusicBar(title || '▶ ' + videoId);
    }

    function playInvidiousPlaylist(firstVideoId, playlistId, title, base, videoIds) {
      stopIframeApiAudio();
      const host = (base || 'https://invidious.f5.si').replace(/\/$/, '');
      // Save playlist state for auto-advance
      invidiousHost     = host;
      invidiousListId   = playlistId;
      invidiousVideoIds = videoIds && videoIds.length > 0 ? videoIds : [firstVideoId];
      invidiousIndex    = 0;

      const url = `${host}/embed/${encodeURIComponent(firstVideoId)}?list=${encodeURIComponent(playlistId)}&autoplay=1`;
      console.log('[CastMyPhotos] Invidious playlist URL:', url, '| total tracks:', invidiousVideoIds.length);
      showDebugUrl(url);
      showOnScreen('⏳ מאתחל Invidious... (5-15 שניות)', '#ff0');
      ytTvFrame.style.zIndex = '4';
      attachIframeDebugListeners(url);
      ytTvFrame.src = url;
      setTimeout(unmuteInvidious, 2000);
      showMusicBar(title ? `▶ ${title}` : '▶ Playlist');
    }

    function stopYtTv() {
      ytTvFrame.src = 'about:blank';
      ytTvFrame.style.zIndex = '1';  // reset below photos
      musicBar.classList.remove('visible');
    }

    function loadYoutubeTv(screenId) {
      if (!ytTvReady) return;
      const url = screenId
        ? `https://www.youtube.com/tv#?auth_fallback=1&screen_id=${encodeURIComponent(screenId)}`
        : 'https://www.youtube.com/tv';
      console.log('[CastMyPhotos] Loading youtube.com/tv with screen_id:', screenId);
      ytTvFrame.src = url;
    }

    // ─── Cast message handling ────────────────────────────────────────────────

    const context = cast.framework.CastReceiverContext.getInstance();

    context.addCustomMessageListener(NS, event => {
      try {
        const data = typeof event.data === 'string'
          ? JSON.parse(event.data) : event.data;

        switch (data.action) {
          case 'auth':
            applyGoogleAuth(data.token);
            break;
          case 'yt_premium_auth':
            applyYouTubePremiumToken(data.token, data.clientId);
            break;
          case 'start_yt_tv_test':
            testYoutubeTvIframe();
            break;
          case 'load_yt_tv':
            loadYoutubeTv(data.screenId);
            break;
          case 'preload':
            preloadImage(data.url);
            break;
          case 'play_invidious_video':
            playInvidiousVideo(data.videoId, data.title, data.invidiousBase);
            break;
          case 'play_invidious_playlist':
            playInvidiousPlaylist(data.firstVideoId, data.playlistId, data.title, data.invidiousBase, data.videoIds);
            break;
          case 'update_invidious_playlist':
            if (data.videoIds && data.videoIds.length > 0) {
              invidiousVideoIds = data.videoIds;
              console.log('[CastMyPhotos] Playlist updated with', data.videoIds.length, 'tracks');
            }
            break;
          case 'play_music':
            playMusic(data.videoId, data.title);
            break;
          case 'play_playlist':
            playPlaylist(data.playlistId, data.title);
            break;
          case 'stop_music':
            stopMusic();
            break;
          case 'pause_music':
            pauseMusic();
            break;
          case 'resume_music':
            resumeMusic();
            break;
          default:
            // Default: show photo
            if (data.url) showImage(data.url, data.durationSeconds);
        }
      } catch (e) {
        console.error('[CastMyPhotos] message error:', e);
      }
    });

    context.start({ disableIdleTimeout: true });
  </script>
</body>
</html>
